server:
  port: 8080
  forward-headers-strategy: native

spring:
  application:
    name: API-GATEWAY-SERVICE
  boot:
    admin:
      client:
        url: "http://localhost:8080/api/admin-dashboard"
        instance:
          management-base-url: "https://thelastfork.shop"
          service-base-url: "https://thelastfork.shop/management"
        api-path: instances
      context-path: /api/admin-dashboard

  #Specifies the service that a request must go to based on its URL
  #Strips the /api prefix from the request and passes it downstream
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**,/api/vendors/**,/api/auth/**,/api/userservice/**
          filters:
            - StripPrefix=1

        - id: user-service-swagger
          uri: http://user-service:8081
          predicates:
            - Path=/userservice/**

        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/products/**,/api/bundles/**,/api/productservice/**,/api/reservations/**
          filters:
            - StripPrefix=1

        - id: product-service-swagger
          uri: http://product-service:8082
          predicates:
            - Path=/productservice/**


        - id: forecast-service
          #uri: http://192.168.0.225:5000
          uri: http://forecast-service:5000
          predicates:
            - Path=/api/forecast/**,/api/forecastservice/**
          filters:
            - StripPrefix=1


      #CORS configuration to allow methods from specified origins
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "https://thelastfork.shop"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true


#Exposes actuator endpoints
management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics,logfile,loggers
  endpoint:
    health:
      show-details: always

logging:
  level:
    de.codecentric.boot.admin: WARN
  file:
    name: "logs/api-gateway.log"